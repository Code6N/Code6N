<!DOCTYPE html>
<html>
<head>
  <title>Zomato Vision Board</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .hidden { display: none; }
    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }
    td, th {
      border: 1px solid #ccc;
      padding: 8px;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Enter Username"><br><br>
  <input type="password" id="password" placeholder="Enter Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN PAGE -->
<div id="mainPage" class="hidden">
  <h1>Welcome to the Zomato Vision Board</h1>

  <button onclick="loadSheet('daily')">Daily Summary</button>
  <button onclick="loadSheet('weekly')">Weekly Summary</button>
  <button onclick="loadSheet('monthly')">Monthly Summary</button>

  <div id="tableContainer"></div>
</div>

<script>
// SIMPLE LOGIN (change username/password if needed)
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user === "Nishchitha" && pass === "DK2476") {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("mainPage").classList.remove("hidden");
  } else {
    alert("Wrong login");
  }
}

// 🔗 PUT YOUR CSV LINKS HERE
const urls = {
  daily: "https://docs.google.com/spreadsheets/d/1cBa6cCxDVl8oGyysvRf3Flgyqm0OXOdKid5bVgz12Dw/edit?gid=1045181863#gid=1045181863",
  weekly: "https://docs.google.com/spreadsheets/d/1cBa6cCxDVl8oGyysvRf3Flgyqm0OXOdKid5bVgz12Dw/edit?gid=157509572#gid=157509572",
  monthly: "https://docs.google.com/spreadsheets/d/1cBa6cCxDVl8oGyysvRf3Flgyqm0OXOdKid5bVgz12Dw/edit?gid=1456289602#gid=1456289602"
};

// LOAD SHEET DATA
function loadSheet(type) {
  fetch(urls[type])
    .then(res => res.text())
    .then(data => {
      const rows = data.split("\n");
      let table = "<table>";

      rows.forEach(row => {
        table += "<tr>";
        row.split(",").forEach(cell => {
          table += `<td>${cell}</td>`;
        });
        table += "</tr>";
      });

      table += "</table>";
      document.getElementById("tableContainer").innerHTML = table;
    });
}
</script>

</body>
</html>
